server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /api/stream {
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
  }

  location /api/ {
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
